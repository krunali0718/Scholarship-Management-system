spring.application.name=scholarhub-backend

# Database Connection (set DB_USERNAME / DB_PASSWORD as environment variables)
spring.datasource.url=jdbc:mysql://localhost:3306/scholarhub_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}


# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT secret (set JWT_SECRET as an environment variable in production)
jwt.secret=${JWT_SECRET:mySecretKeyForJwtAuthenticationmySecretKeyForJwtAuthentication}